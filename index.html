<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CJ - IS QML Bitcoin Research Showcase</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
 
  --bg: #000000; /* ดำสนิทแบบจอ OLED */
  --surface: rgba(28, 28, 30, 0.5); 
  --surface2: rgba(44, 44, 46, 0.5);
  --surface3: rgba(58, 58, 60, 0.5);
  --text: #F5F5F7; /* ขาวนวลสบายตา */
  --text-muted: #D2D2D7; /* เทา Gray */
  --line: rgba(255, 255, 255, 0.12);
  --line-strong: rgba(255, 255, 255, 0.24);
  
  /* Refined Premium Colors */
  --accent: #F2D288; /* ทองคำขาว (Platinum Gold) ดูแพง ไม่เหลืองอ๋อย */
  --accent-soft: rgba(242, 210, 136, 0.08);
  --accent-line: rgba(242, 210, 136, 0.25);
  --accent-glow: 0 0 32px rgba(242, 210, 136, 0.15);
  
  --blue: #2997FF; /*   Blue */
  --green: #30D158; /*   Green */
  --red: #FF453A; /*   Red */
  
  --shadow-base: 0 20px 40px rgba(0, 0, 0, 0.5);
  --shadow-lift: 0 30px 60px rgba(0, 0, 0, 0.7);
  --inner-light: inset 0 1px 0 rgba(255, 255, 255, 0.1); /* ขอบกระจกด้านใน */
  
  --radius-sm: 14px;
  --radius-md: 22px;
  --radius-lg: 36px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background-color: var(--bg);
  /* Ambient Studio Light Effect (แสงไฟสตูดิโอเบาๆ) */
  background-image: 
    radial-gradient(circle at 50% -20%, rgba(242, 210, 136, 0.08), transparent 50%),
    radial-gradient(circle at 100% 50%, rgba(41, 151, 255, 0.03), transparent 40%);
  background-attachment: fixed;
  color: var(--text);
  font-family: "Inter", "Prompt", - -system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* --- Premium Frosted Glass Header --- */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  
  /* 1. กระจกฝ้าโปร่งแสง (Glassmorphism) สไตล์   */
  background: rgba(10, 10, 12, 0.65);
  backdrop-filter: saturate(200%) blur(24px);
  -webkit-backdrop-filter: saturate(200%) blur(24px);
  
  /* 2. มิติแสงเงา: เงาฟุ้งด้านนอก + เส้นกระจกสะท้อนแสงด้านใน */
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.5),             
    inset 0 -1px 0 rgba(255, 255, 255, 0.08); 
}

/* 3. เส้นขอบนำสายตาสีทองคำขาว (Platinum Gold Accent Line) */
header::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  /* ไล่สีให้สว่างตรงกลางและกลืนหายไปที่ปลายขอบทั้ง 2 ข้าง */
  background: linear-gradient(90deg, transparent 5%, rgba(229, 195, 122, 0.5) 50%, transparent 95%);
  z-index: 101;
}

.nav {
  max-width: 1240px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  font-weight: 850; 
  font-size: 1.45rem; /* ขยายขนาดให้ใหญ่ขึ้นอีกนิด */
  letter-spacing: -0.02em; 
  
  /* เอฟเฟกต์สีทอง 3D Metallic Gold (Premium Foil) */
  background: linear-gradient(to right, #F2D288 0%, #D6B56D 40%, #FFFFFF 80%, #F2D288 100%);
  background-size: 200% auto; /* เตรียมไว้ทำแอนิเมชันแสงสะท้อน */
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  
  /* เรืองแสงสีทองอ่อนๆ ตัดกับพื้นหลังสีดำสนิท */
  filter: drop-shadow(0 2px 10px rgba(229, 195, 122, 0.25)); 
  transition: all 0.5s ease;
  cursor: default;
}

.brand:hover {
  /* แสงเรืองรองสว่างขึ้น และมีแสงสีขาววิ่งผ่านตัวอักษรตอนเอาเมาส์ชี้ */
  filter: drop-shadow(0 2px 16px rgba(229, 195, 122, 0.45));
  background-position: right center; 
}

.nav-right { display: flex; align-items: center; gap: 20px; }

.nav-links a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  transition: color 0.3s ease;
}

.nav-links a:hover { color: var(--text); }

/* --- Language Toggle --- */
.lang-toggle {
  display: inline-flex;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px;
}

.lang-toggle button {
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.lang-toggle button.active {
  background: var(--text);
  color: #000;
}

/* --- Main Layout --- */
main { max-width: 1240px; margin: 0 auto; padding: 60px 24px 100px; }

/* --- Hero Section --- */
.hero {
  display: grid;
  grid-template-columns: 1.25fr 0.75fr;
  gap: 24px;
  margin-bottom: 40px;
}

.hero-main, .hero-answer, .kpi, .summary-card, .panel, .metric-board, .claim-column, .appendix, .decision-box {
  background: var(--surface);
  backdrop-filter: saturate(180%) blur(40px);
  -webkit-backdrop-filter: saturate(180%) blur(40px);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-base), var(--inner-light);
  position: relative;
  overflow: hidden;
}

.hero-main { padding: 64px 48px; }
.hero-answer { 
  padding: 48px 40px; 
  display: flex; 
  flex-direction: column; 
  justify-content: space-between; 
}

.eyebrow {
  display: inline-flex;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 24px;
}

/*   Metallic Gradient Text */
h1 {
  margin: 0 0 20px;
  font-size: clamp(28px, 3.2vw, 42px);
  line-height: 1.15;
  font-weight: 700;
  letter-spacing: -0.03em;
  background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-main p { color: var(--text-muted); font-size: 18px; max-width: 90%; font-weight: 400; }

.answer-label {
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.hero-answer h2 { 
  font-size: 28px; 
  line-height: 1.25; 
  margin: 16px 0; 
  color: var(--text);
  font-weight: 600;
  letter-spacing: -0.02em;
}
.hero-answer p { color: var(--text-muted); font-size: 16px; font-weight: 400; }

.answer-footer {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  color: var(--text-muted);
  font-size: 12px;
  opacity: 0.6;
}

/* --- KPI Grid --- */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 40px 0 80px; }

.kpi {
  border-radius: var(--radius-md);
  padding: 32px 24px;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  text-align: center;
}

.kpi:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--accent-line);
  box-shadow: var(--shadow-lift), var(--accent-glow);
  background: rgba(44, 44, 46, 0.7);
}

.kpi-number { color: var(--text); font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 12px; letter-spacing: -0.04em; }
.kpi:last-child .kpi-number { color: var(--accent); } /* ไฮไลท์เลข 0 ตัวสุดท้าย */
.kpi-label { font-weight: 600; font-size: 14px; color: var(--text-muted); }
.kpi p { color: var(--text-muted); font-size: 12px; margin: 8px 0 0; opacity: 0.6; }

/* --- Section Formatting --- */
.section { margin-top: 80px; }
.section-head { margin-bottom: 40px; max-width: 800px; }
.section-kicker { color: var(--accent); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
.section h2 { margin: 0 0 16px; font-size: 32px; font-weight: 700; letter-spacing: -0.03em; }
.section-desc { color: var(--text-muted); font-size: 18px; font-weight: 400; }

/* --- Cards & Panels --- */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

.summary-card, .panel, .metric-board, .claim-column, .appendix, .decision-box {
  border-radius: var(--radius-md);
  padding: 32px;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.summary-card:hover, .decision-box:hover {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.2);
  box-shadow: var(--shadow-lift), var(--inner-light);
}

.summary-card h3 { margin: 0 0 12px; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
.summary-card p { color: var(--text-muted); margin: 0; font-size: 15px; line-height: 1.6; }

.plot { height: 400px; width: 100%; margin: 24px 0; }

.so-what {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--line);
  padding: 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
}
.so-what strong { color: var(--text); font-weight: 600; }

/* --- Metric Boards --- */
.evidence-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }
.metric-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 24px 0; }
.metric {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 20px;
}
.metric-value { font-size: 32px; font-weight: 700; color: var(--text); letter-spacing: -0.03em; }
.metric-label { font-size: 12px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }

/* --- Claim Columns --- */
.claim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.claim-column h3 { font-size: 20px; margin: 0 0 20px; padding-bottom: 16px; border-bottom: 1px solid var(--line); font-weight: 600; }
.claim-supported h3 { color: var(--green); border-bottom-color: rgba(48, 209, 88, 0.2); }
.claim-qualified h3 { color: var(--accent); border-bottom-color: var(--accent-line); }
.claim-not h3 { color: var(--red); border-bottom-color: rgba(255, 69, 58, 0.2); }
.claim-column ul { margin: 0; padding-left: 20px; color: var(--text-muted); font-size: 15px; }
.claim-column li { margin-bottom: 14px; line-height: 1.6; }
.claim-column li::marker { color: rgba(255,255,255,0.3); }

/* --- Decision Box --- */
.decision-box {
  background: radial-gradient(circle at 50% 0%, rgba(242, 210, 136, 0.1), var(--surface));
  border: 1px solid var(--accent-line);
  text-align: center;
  padding: 64px 40px;
  border-radius: var(--radius-lg);
}
.decision-box .section-kicker { display: block; margin-bottom: 20px; }
.decision-box p { margin: 0 auto; max-width: 800px; font-size: 20px; color: var(--text-muted); line-height: 1.6; }

/* --- Tables & Details --- */
details { border-bottom: 1px solid var(--line); padding: 20px 0; }
details:last-child { border-bottom: none; }
summary { font-weight: 600; font-size: 16px; cursor: pointer; color: var(--text); outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
summary::-webkit-details-marker { display: none; }
summary::after { content: '+'; color: var(--text-muted); font-size: 24px; font-weight: 300; transition: transform 0.3s ease; }
details[open] summary::after { transform: rotate(45deg); color: var(--text); } /* แอนิเมชันหมุนกากบาท */

.table-scroll { overflow-x: auto; margin-top: 24px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: rgba(0, 0, 0, 0.3); }
table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
th { background: rgba(255,255,255,0.03); color: var(--text); font-weight: 500; padding: 16px 20px; border-bottom: 1px solid var(--line); white-space: nowrap; }
td { padding: 16px 20px; color: var(--text-muted); border-bottom: 1px solid var(--line); }
tr { transition: background-color 0.2s ease; }
tr:hover { background-color: rgba(255,255,255,0.05); } 
tr:last-child td { border-bottom: none; }

/* --- Footer --- */
.footer { margin-top: 80px; padding-top: 40px; border-top: 1px solid var(--line); text-align: center; color: var(--text-muted); font-size: 13px; opacity: 0.6; }

/* --- Wow Factor Animations --- */
.reveal {
  opacity: 0;
  transform: translateY(30px) scale(0.98);
  transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); /*   Easing */
}
.reveal.active {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* --- Responsive --- */
@media (max-width: 1024px) {
  .hero, .dashboard-grid, .evidence-pair, .claim-grid { grid-template-columns: 1fr; }
  .kpi-grid, .summary-grid { grid-template-columns: repeat(2, 1fr); }
  h1 { font-size: 32px; }
  .hero-main { padding: 48px 32px; }
}
@media (max-width: 600px) {
  .kpi-grid, .summary-grid { grid-template-columns: 1fr; }
  .nav { flex-direction: column; gap: 16px; align-items: flex-start; }
  .hero-main, .hero-answer, .decision-box { padding: 32px 24px; }
}

/* --- Typography Legibility Optimization --- */
.hero-main p, .hero-answer p, .summary-card p, .panel p, .so-what, td {
  color: var(--text-muted);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65; /* เพิ่มความห่างระหว่างบรรทัดให้อ่านเนื้อหายาวๆ ได้ง่าย ไม่ล้าสายตา */
  letter-spacing: -0.01em;
}

/* ปรับให้ส่วนข้อความสรุปในการ์ด KPI ชัดเจนยิ่งขึ้น */
.kpi p {
  color: var(--text-muted);
  font-size: 13px;
  opacity: 0.85; /* เพิ่มความเข้มขึ้นจากเดิมที่ตั้งไว้ 0.6 */
}

/* --- Premium Strategic Highlighting System (  Pro Layout) --- */
tr.highlight-row {
  background-color: rgba(242, 210, 136, 0.04) !important;
  transition: all 0.3s ease;
}
tr.highlight-row td {
  color: #FFFFFF !important; /* ดึงตัวอักษรให้ออกโทนขาวบริสุทธิ์สว่างกว่าแถวปกติ */
  font-weight: 600; /* เพิ่มความหนาของตัวอักษรเพื่อเน้นผลลัพธ์ */
}
tr.highlight-row td:first-child {
  box-shadow: inset 4px 0 0 var(--accent); /* เติมแถบสีทองบางเฉียบนำสายตาสไตล์พรีเมียม */
  padding-left: 20px;
}
.badge-focus {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.badge-focus.gold {
  background: rgba(242, 210, 136, 0.12);
  border: 1px solid rgba(242, 210, 136, 0.3);
  color: var(--accent);
}
.badge-focus.red {
  background: rgba(255, 69, 58, 0.12);
  border: 1px solid rgba(255, 69, 58, 0.3);
  color: var(--red);
}
/* --- Global   Metallic Gradientสำหรับ หัวข้อรอง (h2) ทั้งหมด --- */
h2 {
  font-weight: 700;
  letter-spacing: -0.03em;
  /* ไล่เฉดสีจากขาวบริสุทธิ์ลงไปหาเทาเงินไทเทเนียมสไตล์เมทัลลิก */
  background: linear-gradient(180deg, #FFFFFF 0%, #A1A1A6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block; /* เพื่อให้เนื้อสีของ Gradient คลุมพอดีเฉพาะตัวอักษร */
  margin: 0;
}

/* ล้างค่าสีเดิมของ h2 ในกล่องเฉพาะจุดเพื่อให้เซ็ตอัปเอฟเฟกต์ทำงานได้สมบูรณ์ */
.hero-answer h2, .section h2, .decision-box h2 {
  color: transparent !important;
}
</style>

</head>

<body>
<header>
  <nav class="nav">
    <div class="brand">CJ - IS QML Bitcoin Research Showcase</div>
    <div class="nav-right">
      <div class="nav-links">
        <a href="#summary" data-i18n="nav_summary"></a>
        <a href="#dashboard" data-i18n="nav_dashboard"></a>
        <a href="#claims" data-i18n="nav_claims"></a>
        <a href="#appendix" data-i18n="nav_appendix"></a>
      </div>
      <div class="lang-toggle" aria-label="Language toggle">
        <button id="btn-en" class="active" onclick="setLanguage('en')">EN</button>
        <button id="btn-th" onclick="setLanguage('th')">TH</button>
      </div>
    </div>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="hero-main">
      <div class="eyebrow" data-i18n="eyebrow"></div>
      <h1 data-i18n="hero_title"></h1>
      <p data-i18n="hero_subtitle"></p>
      <p data-i18n="hero_positioning"></p>
    </div>

    <aside class="hero-answer">
      <div>
        <div class="answer-label" data-i18n="final_answer_label"></div>
        <h2 data-i18n="final_answer_title"></h2>
        <p data-i18n="final_answer_text"></p>
      </div>
    </aside>
  </section>

  <section class="kpi-grid reveal">
    <div class="kpi">
      <div class="kpi-number">27</div>
      <div class="kpi-label" data-i18n="kpi_folds_label"></div>
      <p data-i18n="kpi_folds_note"></p>
    </div>
    <div class="kpi">
      <div class="kpi-number">3</div>
      <div class="kpi-label" data-i18n="kpi_horizons_label"></div>
      <p data-i18n="kpi_horizons_note"></p>
    </div>
    <div class="kpi">
      <div class="kpi-number">4</div>
      <div class="kpi-label" data-i18n="kpi_layers_label"></div>
      <p data-i18n="kpi_layers_note"></p>
    </div>
    <div class="kpi">
      <div class="kpi-number" data-i18n="kpi_num"></div>
      <div class="kpi-label" data-i18n="kpi_adv_label"></div>
      <p data-i18n="kpi_adv_note"></p>
    </div>
  </section>

  <section class="section reveal" id="summary">
    <div class="section-head">
      <div>
        <div class="section-kicker" data-i18n="summary_kicker"></div>
        <h2 data-i18n="summary_title"></h2>
      </div>
      <p class="section-desc" data-i18n="summary_desc"></p>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <h3 data-i18n="sum1_title"></h3>
        <p data-i18n="sum1_text"></p>
      </div>
      <div class="summary-card">
        <h3 data-i18n="sum2_title"></h3>
        <p data-i18n="sum2_text"></p>
      </div>
      <div class="summary-card">
        <h3 data-i18n="sum3_title"></h3>
        <p data-i18n="sum3_text"></p>
      </div>
      <div class="summary-card">
        <h3 data-i18n="sum4_title"></h3>
        <p data-i18n="sum4_text"></p>
      </div>
    </div>
  </section>

  <section class="section reveal" id="dashboard">
    <div class="section-head">
      <div>
        <div class="section-kicker" data-i18n="dashboard_kicker"></div>
        <h2 data-i18n="dashboard_title"></h2>
      </div>
      <p class="section-desc" data-i18n="dashboard_desc"></p>
    </div>

    <div class="dashboard-grid">
      <div class="panel">
        <h3 data-i18n="chart1_title"></h3>
        <p data-i18n="chart1_desc"></p>
        <div id="chart_classification" class="plot"></div>
        <div class="so-what" data-i18n="chart1_sowhat"></div>

function tracesByModel(data, metric, decimals) {
  return models.map(model => {
    const rows = data
      .filter(d => d.model === model)
      .sort((a, b) => Number(a.horizon) - Number(b.horizon));

    return {
      type: 'bar',
      name: model,
      x: rows.map(d => 'h=' + d.horizon),
      y: rows.map(d => d[metric]),
      text: rows.map(d => Number(d[metric]).toFixed(decimals)),
      textposition: 'auto',
      hovertemplate: '%{x}<br>' + model + '<br>%{y:.3f}<extra></extra>'
    };
  });
}

// 2. Scroll Reveal Effect
function reveal() {
  var reveals = document.querySelectorAll(".reveal");
  for (var i = 0; i < reveals.length; i++) {
    var windowHeight = window.innerHeight;
    var elementTop = reveals[i].getBoundingClientRect().top;
    var elementVisible = 100;
    if (elementTop < windowHeight - elementVisible) {
      reveals[i].classList.add("active");
    }
  }
}
window.addEventListener("scroll", reveal);

  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    // ใช้ easeOut effect
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    obj.innerHTML = Math.floor(easeProgress * (end - start) + start);
    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      obj.innerHTML = end; // รับประกันเลขจบเป๊ะ
    }
  };
  window.requestAnimationFrame(step);
}

// Trigger Animations เมื่อโหลดเว็บ
window.addEventListener('load', () => {
  setLanguage('en');
  setTimeout(reveal, 100); // ดึง reveal ให้ทำงานรอบแรก
  
  // รันเลข KPI เมื่อเปิดเว็บ
  const kpis = document.querySelectorAll('.kpi-number');
  if(kpis.length >= 3) {
    animateValue(kpis[0], 0, 27, 1500); // 27 Folds
    animateValue(kpis[1], 0, 3, 1000);  // 3 Horizons
    animateValue(kpis[2], 0, 4, 1200);  // 4 Layers
  }
});

</script>
</body>
