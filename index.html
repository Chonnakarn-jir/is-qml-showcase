<style>
:root {
  --bg: #06090D; /* เข้มขึ้นเพื่อให้คอนทราสต์จัดกว่าเดิม */
  --surface: #10161D;
  --surface2: #161E28;
  --surface3: #1C2633;
  --text: #F8F9FA;
  --text-muted: #A1ABB8;
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.15);
  
  /* Brand Colors */
  --accent: #E5C37A; /* สีทองสว่างขึ้น */
  --accent-soft: rgba(229, 195, 122, 0.1);
  --accent-line: rgba(229, 195, 122, 0.3);
  --accent-glow: 0 0 20px rgba(229, 195, 122, 0.15);
  
  --blue: #8AB4F8;
  --green: #6EE7B7;
  --red: #F87171;
  
  --shadow-base: 0 4px 20px rgba(0, 0, 0, 0.5);
  --shadow-lift: 0 12px 30px rgba(0, 0, 0, 0.7);
  --radius-sm: 12px;
  --radius-md: 20px;
  --radius-lg: 32px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 15% 0%, rgba(138, 180, 248, 0.08), transparent 40%),
    radial-gradient(circle at 85% 10%, rgba(229, 195, 122, 0.06), transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(138, 180, 248, 0.05), transparent 50%);
  background-attachment: fixed;
  color: var(--text);
  /* เปลี่ยนบรรทัดนี้บรรทัดเดียว */
  font-family: "Inter", "Prompt", sans-serif;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* --- Header & Navigation --- */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(6, 9, 13, 0.75);
  border-bottom: 1px solid var(--line);
}

.nav {
  max-width: 1240px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  font-weight: 800;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
  background: linear-gradient(90deg, #FFF, var(--text-muted));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-right { display: flex; align-items: center; gap: 16px; }

.nav-links a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  transition: all 0.2s ease;
}

.nav-links a:hover {
  color: var(--accent);
  background: var(--accent-soft);
}

/* --- Language Toggle --- */
.lang-toggle {
  display: inline-flex;
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 4px;
}

.lang-toggle button {
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-weight: 700;
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.2s;
}

.lang-toggle button.active {
  background: var(--accent);
  color: #000;
  box-shadow: var(--accent-glow);
}

/* --- Main Layout --- */
main { max-width: 1240px; margin: 0 auto; padding: 40px 24px 80px; }

/* --- Hero Section --- */
.hero {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 24px;
  margin-bottom: 32px;
}

.hero-main, .hero-answer {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-base);
  position: relative;
  overflow: hidden;
}

.hero-main::before { /* Subtle Top Glow */
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-line), transparent);
}

.hero-main { padding: 56px 48px; }

.hero-answer { padding: 40px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(180deg, var(--surface) 0%, rgba(229,195,122,0.03) 100%); }

.eyebrow {
  display: inline-flex;
  color: var(--accent);
  background: var(--accent-soft);
  border: 1px solid var(--accent-line);
  border-radius: 999px;
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 24px;
}

h1 {
  margin: 0 0 16px;
  font-size: clamp(22px, 2.5vw, 36px);
  line-height: 1.1;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.hero-main p { color: var(--text-muted); font-size: 18px; max-width: 90%; }

.answer-label {
  color: var(--accent);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.hero-answer h2 { font-size: 28px; line-height: 1.2; margin: 16px 0; color: #FFF; }
.hero-answer p { color: var(--text-muted); font-size: 15px; }

.answer-footer {
  margin-top: auto;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  color: var(--text-muted);
  font-size: 12px;
  opacity: 0.7;
}

/* --- KPI Grid --- */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 32px 0 64px; }

.kpi {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 24px;
  transition: transform 0.3s ease, border-color 0.3s ease;
}

.kpi:hover {
  transform: translateY(-4px);
  border-color: var(--line-strong);
  box-shadow: var(--shadow-lift);
}

.kpi-number { color: var(--accent); font-size: 40px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
.kpi-label { font-weight: 700; font-size: 14px; color: var(--text); }
.kpi p { color: var(--text-muted); font-size: 12px; margin: 4px 0 0; }

/* --- Section Formatting --- */
.section { margin-top: 64px; }
.section-head { margin-bottom: 32px; max-width: 800px; }
.section-kicker { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.section h2 { margin: 0 0 12px; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
.section-desc { color: var(--text-muted); font-size: 16px; }

/* --- Cards & Panels --- */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.summary-card, .panel, .metric-board, .claim-column, .appendix, .decision-box {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 24px;
  box-shadow: var(--shadow-base);
  transition: border-color 0.3s ease;
}

.summary-card:hover, .panel:hover {
  transform: translateY(-4px);
  border-color: var(--line-strong);
  box-shadow: var(--shadow-lift);
}

.summary-card h3 { margin: 0 0 12px; font-size: 16px; font-weight: 700; }
.summary-card p { color: var(--text-muted); margin: 0; font-size: 14px; line-height: 1.5; }

.plot { height: 400px; width: 100%; margin: 16px 0; }

.so-what {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  padding: 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 14px;
  color: var(--text-muted);
}
.so-what strong { color: var(--text); font-weight: 700; }

/* --- Metric Boards --- */
.evidence-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.metric-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.metric {
  background: var(--surface2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 16px;
}
.metric-value { font-size: 28px; font-weight: 800; color: var(--accent); }
.metric-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

/* --- Claim Columns --- */
.claim-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.claim-column h3 { font-size: 18px; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.claim-supported h3 { color: var(--green); border-bottom-color: rgba(110, 231, 183, 0.2); }
.claim-qualified h3 { color: var(--accent); border-bottom-color: var(--accent-line); }
.claim-not h3 { color: var(--red); border-bottom-color: rgba(248, 113, 113, 0.2); }
.claim-column ul { margin: 0; padding-left: 18px; color: var(--text-muted); font-size: 14px; }
.claim-column li { margin-bottom: 12px; line-height: 1.5; }

/* --- Decision Box --- */
.decision-box {
  background: linear-gradient(135deg, var(--surface2), var(--surface));
  border: 1px solid var(--accent-line);
  text-align: center;
  padding: 48px;
}
.decision-box .section-kicker { display: block; margin-bottom: 16px; }
.decision-box p { margin: 0 auto; max-width: 800px; font-size: 18px; color: var(--text); }

/* --- Tables & Details --- */
details { border-bottom: 1px solid var(--line); padding: 16px 0; }
details:last-child { border-bottom: none; }
summary { font-weight: 700; cursor: pointer; color: var(--text); outline: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
summary::-webkit-details-marker { display: none; }
summary::after { content: '+'; color: var(--accent); font-size: 20px; font-weight: 400; }
details[open] summary::after { content: '−'; }

.table-scroll { overflow-x: auto; margin-top: 16px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--bg); }
table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
th { background: var(--surface2); color: var(--text); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--line); white-space: nowrap; }
td { padding: 12px 16px; color: var(--text-muted); border-bottom: 1px solid var(--line); }
tr { transition: background-color 0.2s ease; }
tr:hover { background-color: rgba(255,255,255,0.03); } /* Hover Effect สำหรับตาราง */
tr:last-child td { border-bottom: none; }

/* --- Footer --- */
.footer { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--line); text-align: center; color: var(--text-muted); font-size: 12px; }

/* --- Responsive --- */
@media (max-width: 1024px) {
  .hero, .dashboard-grid, .evidence-pair, .claim-grid { grid-template-columns: 1fr; }
  .kpi-grid, .summary-grid { grid-template-columns: repeat(2, 1fr); }
  h1 { font-size: 40px; }
}
@media (max-width: 600px) {
  .kpi-grid, .summary-grid { grid-template-columns: 1fr; }
  .nav { flex-direction: column; gap: 16px; align-items: flex-start; }
  .hero-main { padding: 32px 24px; }
}
</style>

const tradingData = [{"horizon": "1", "model": "RBF_PCA", "sharpe": -0.2410999924, "total_return": -0.6395849733, "max_drawdown": -0.9283611797, "total_turnover": 587.0}, {"horizon": "1", "model": "RBF_FULL", "sharpe": -0.2645604792, "total_return": -0.6738587047, "max_drawdown": -0.9263054564, "total_turnover": 671.0}, {"horizon": "1", "model": "QSVM", "sharpe": -0.6691284914, "total_return": -0.9411552737, "max_drawdown": -0.9713909622, "total_turnover": 1315.0}, {"horizon": "7", "model": "RBF_FULL", "sharpe": 0.6556764965, "total_return": 19.3243467875, "max_drawdown": -0.6808406592, "total_turnover": 157.0}, {"horizon": "7", "model": "RBF_PCA", "sharpe": 0.5836922409, "total_return": 13.6247711628, "max_drawdown": -0.6355973476, "total_turnover": 157.0}, {"horizon": "7", "model": "QSVM", "sharpe": 0.3417169401, "total_return": 3.8347594075, "max_drawdown": -0.6796473773, "total_turnover": 245.0}, {"horizon": "30", "model": "RBF_FULL", "sharpe": 0.7675353511, "total_return": 85.5821555478, "max_drawdown": -0.6439249329, "total_turnover": 77.0}, {"horizon": "30", "model": "RBF_PCA", "sharpe": 0.5155196246, "total_return": 19.8075256831, "max_drawdown": -0.8081431265, "total_turnover": 77.0}, {"horizon": "30", "model": "QSVM", "sharpe": 0.3415175292, "total_return": 6.5721672121, "max_drawdown": -0.864497361, "total_turnover": 89.0}];
const diagnosticData = [{"model": "QSVM", "effective_rank": 147.8}, {"model": "RBF_PCA", "effective_rank": 35.9}];
const models = ["QSVM", "RBF_FULL", "RBF_PCA"];

const plotConfig = { responsive: true, displayModeBar: false };
let currentLang = 'en';

const baseColors = ['#D6B56D', '#7FA7C7', '#8FBF9F', '#C96F6F'];

function baseLayout(lang) {
  const t = i18n[lang];
  return {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#F3F4F1', family: 'Inter, Arial, sans-serif' },
    margin: { l: 54, r: 24, t: 12, b: 54 },
    legend: {
      orientation: 'h',
      y: -0.20,
      font: { color: '#B3BCC9' }
    },
    xaxis: {
      gridcolor: '#2A3442',
      zerolinecolor: '#2A3442',
      tickfont: { color: '#B3BCC9' }
    },
    yaxis: {
      gridcolor: '#2A3442',
      zerolinecolor: '#2A3442',
      tickfont: { color: '#B3BCC9' }
    },
    colorway: baseColors
  };
}

function tracesByModel(data, metric, decimals) {
  return models.map(model => {
    const rows = data
      .filter(d => d.model === model)
      .sort((a, b) => Number(a.horizon) - Number(b.horizon));

    return {
      type: 'bar',
      name: model,
      x: rows.map(d => 'h=' + d.horizon),
      y: rows.map(d => d[metric]),
      text: rows.map(d => Number(d[metric]).toFixed(decimals)),
      textposition: 'auto',
      hovertemplate: '%{x}<br>' + model + '<br>%{y:.3f}<extra></extra>'
    };
  });
}

function renderCharts(lang) {
  const t = i18n[lang];
  const layout = baseLayout(lang);

  Plotly.react(
    'chart_classification',
    tracesByModel(classificationData, 'mean_f1', 3),
    {
      ...layout,
      barmode: 'group',
      yaxis: {
        ...layout.yaxis,
        title: { text: t.axis_f1, font: { color: '#B3BCC9' } },
        range: [0, 0.60]
      }
    },
    plotConfig
  );

  Plotly.react(
    'chart_trading',
    tracesByModel(tradingData, 'sharpe', 2),
    {
      ...layout,
      barmode: 'group',
      yaxis: {
        ...layout.yaxis,
        title: { text: t.axis_sharpe, font: { color: '#B3BCC9' } }
      },
      shapes: [{
        type: 'line',
        xref: 'paper',
        x0: 0,
        x1: 1,
        yref: 'y',
        y0: 0,
        y1: 0,
        line: { color: '#B3BCC9', width: 1, dash: 'dot' }
      }]
    },
    plotConfig
  );

  Plotly.react(
    'chart_diagnostic',
    [{
      type: 'bar',
      x: diagnosticData.map(d => d.model),
      y: diagnosticData.map(d => d.effective_rank),
      text: diagnosticData.map(d => Number(d.effective_rank).toFixed(1)),
      textposition: 'auto',
      marker: { color: ['#D6B56D', '#7FA7C7'] },
      hovertemplate: '%{x}<br>Effective rank: %{y:.1f}<extra></extra>'
    }],
    {
      ...layout,
      showlegend: false,
      margin: { l: 54, r: 24, t: 38, b: 44 },
      yaxis: {
        ...layout.yaxis,
        title: { text: t.axis_rank, font: { color: '#B3BCC9' } }
      },
      annotations: [{
        text: t.diag_annotation,
        xref: 'paper',
        yref: 'paper',
        x: 0.5,
        y: 1.18,
        showarrow: false,
        font: { color: '#D6B56D', size: 12 }
      }]
    },
    plotConfig
  );
}

function setLanguage(lang) {
  currentLang = lang;
  document.documentElement.lang = lang === 'th' ? 'th' : 'en';

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) {
      el.innerHTML = i18n[lang][key];
    }
  });

  document.getElementById('table_classification_container').innerHTML = tableHTML[lang].classification;
  document.getElementById('table_trading_container').innerHTML = tableHTML[lang].trading;
  document.getElementById('table_decision_container').innerHTML = tableHTML[lang].decision;
  document.getElementById('table_diagnostic_container').innerHTML = tableHTML[lang].diagnostic;
  document.getElementById('table_verdict_container').innerHTML = tableHTML[lang].verdict;

  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-th').classList.toggle('active', lang === 'th');

  renderCharts(lang);
}

window.addEventListener('load', () => {
  setLanguage('en');
});
</script>
